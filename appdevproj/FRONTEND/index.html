<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lost & Found @ TIP Manila</title>
<style>
  :root {
    --primary: #ffc20e;
    --black: #1e1e1e;
    --white: #ffffff;
    --gray: #f4f4f4;
    --text-muted: #555;
    --accent: #f37021;
    --radius: 12px;
  }
  body { font-family: "Segoe UI", Arial, sans-serif; background: var(--gray); color: var(--black); margin: 0; padding: 0; }
  h1 { background: var(--primary); color: var(--black); text-align: center; padding: 30px 15px; font-size: 2.4rem; margin: 0; font-weight: 700; border-bottom: 3px solid var(--accent); }

  /* Auth bar */
  #auth-bar { display: flex; justify-content: flex-end; align-items: center; gap: 10px; padding: 10px 24px; background: var(--black); color: #fff; font-size: 0.9rem; }
  #auth-bar button { background: var(--primary); color: var(--black); border: none; padding: 7px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
  #auth-bar a { color: var(--primary); cursor: pointer; text-decoration: underline; font-size: 0.85rem; }

  /* Auth modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .modal h2 { margin: 0 0 20px; font-size: 1.4rem; }
  .modal input { width: 100%; padding: 12px; margin: 6px 0 14px; border: 1px solid #ccc; border-radius: var(--radius); font-size: 1rem; box-sizing: border-box; }
  .modal button { width: 100%; padding: 12px; background: var(--black); color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: bold; cursor: pointer; }
  .modal .switch { text-align: center; margin-top: 14px; font-size: 0.9rem; color: var(--text-muted); }
  .modal .switch a { color: var(--accent); cursor: pointer; }
  .modal .close { float: right; cursor: pointer; font-size: 1.3rem; color: #aaa; margin-top: -8px; }
  .modal .error { color: #c0392b; font-size: 0.85rem; margin-bottom: 10px; }

  form#itemForm { background: var(--white); padding: 30px 25px; border-radius: var(--radius); max-width: 700px; margin: 40px auto; border-top: 6px solid var(--primary); }
  input, textarea, select { width: 100%; padding: 14px; margin: 12px 0 20px 0; border: 1px solid #ccc; border-radius: var(--radius); font-size: 1rem; background: #fff; transition: border 0.3s ease; box-sizing: border-box; }
  input:focus, textarea:focus, select:focus { border-color: var(--primary); outline: none; }
  button { background: var(--black); color: var(--white); border: none; padding: 14px 24px; border-radius: var(--radius); font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s ease, transform 0.2s ease; }
  button:hover { background: #333; transform: translateY(-2px); }
  .search-filter { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 40px auto 20px; max-width: 700px; padding: 0 15px; }
  .search-filter input, .search-filter select { padding: 12px; border-radius: var(--radius); border: 1px solid #ccc; flex: 1; min-width: 200px; margin: 0; }
  .items-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 30px; max-width: 1200px; margin: auto; }
  .item-card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.08); transition: transform 0.3s ease; }
  .item-card:hover { transform: translateY(-5px); }
  .item-card strong { font-size: 1.1rem; }
  .item-card em { color: var(--text-muted); font-size: 0.9rem; }
  .item-card img { width: 100%; border-radius: 8px; margin-top: 12px; object-fit: cover; max-height: 180px; }
  .item-card button { margin-top: 10px; background: var(--accent); color: #fff; padding: 10px 18px; font-size: 0.95rem; }
  .item-card button:hover { background: #c85617; }
  .claimed { display: inline-block; margin-top: 10px; padding: 6px 12px; background: #e6ffe6; color: green; font-weight: bold; border-radius: 6px; font-size: 0.95rem; }
  #form-notice { text-align: center; color: var(--text-muted); padding: 20px; font-style: italic; max-width: 700px; margin: 30px auto 0; }
</style>
</head>
<body>

<!-- Auth bar -->
<div id="auth-bar">
  <span id="auth-status">Not logged in</span>
  <button id="auth-btn" onclick="openAuthModal('login')">Log in / Register</button>
</div>

<h1>Lost & Found @ TIP Manila</h1>

<!-- Auth modal -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <span class="close" onclick="closeAuthModal()">&#x2715;</span>
    <h2 id="modal-title">Log in</h2>
    <div class="error" id="auth-error"></div>
    <input type="text"     id="auth-username" placeholder="Username" />
    <input type="password" id="auth-password" placeholder="Password" />
    <button onclick="submitAuth()">Continue</button>
    <div class="switch" id="modal-switch">
      No account? <a onclick="toggleAuthMode()">Register</a>
    </div>
  </div>
</div>

<!-- Submit form (visible only when logged in) -->
<div id="form-notice">You must be logged in to report a lost or found item.</div>
<form id="itemForm" style="display:none">
  <input type="text"  id="itemName"        name="itemName"        placeholder="Item Name" required />
  <textarea           id="description"     name="description"     placeholder="Description" required></textarea>
  <input type="date"  id="dateLostOrFound" name="dateLostOrFound" required />
  <select id="status" name="status" required>
    <option value="">Select Status</option>
    <option value="lost">Lost</option>
    <option value="found">Found</option>
  </select>
  <input type="text" id="contactInfo" name="contactInfo" placeholder="Your Contact Info" required />
  <input type="file" id="imageFile"   name="image" accept="image/*" />
  <button type="submit">Submit</button>
</form>

<div class="search-filter">
  <input  type="text" id="searchInput"  placeholder="Search items...">
  <select id="filterStatus">
    <option value="">All</option>
    <option value="lost">Lost</option>
    <option value="found">Found</option>
    <option value="claimed">Claimed</option>
  </select>
</div>

<div class="items-container" id="itemsContainer"></div>

<script>
  const API    = '/api/items';
  const AUTH   = '/api/auth';

  // ── Token helpers ───────────────────────────────────────────────────────────
  function getToken()         { return localStorage.getItem('lf_token'); }
  function getUser()          { return localStorage.getItem('lf_user'); }
  function setSession(t, u)   { localStorage.setItem('lf_token', t); localStorage.setItem('lf_user', u); }
  function clearSession()     { localStorage.removeItem('lf_token'); localStorage.removeItem('lf_user'); }

  function authHeaders() {
    const t = getToken();
    return t ? { 'Authorization': 'Bearer ' + t } : {};
  }

  // ── UI state ────────────────────────────────────────────────────────────────
  function updateUI() {
    const user = getUser();
    const bar  = document.getElementById('auth-status');
    const btn  = document.getElementById('auth-btn');
    const form = document.getElementById('itemForm');
    const notice = document.getElementById('form-notice');
    if (user) {
      bar.textContent = 'Logged in as ' + user;
      btn.textContent = 'Log out';
      btn.onclick     = logout;
      form.style.display  = 'block';
      notice.style.display = 'none';
    } else {
      bar.textContent = 'Not logged in';
      btn.textContent = 'Log in / Register';
      btn.onclick     = () => openAuthModal('login');
      form.style.display  = 'none';
      notice.style.display = 'block';
    }
  }

  function logout() {
    clearSession();
    updateUI();
  }

  // ── Auth modal ──────────────────────────────────────────────────────────────
  let authMode = 'login';

  function openAuthModal(mode) {
    authMode = mode || 'login';
    document.getElementById('modal-title').textContent  = authMode === 'login' ? 'Log in' : 'Register';
    document.getElementById('modal-switch').innerHTML   = authMode === 'login'
      ? 'No account? <a onclick="toggleAuthMode()">Register</a>'
      : 'Have an account? <a onclick="toggleAuthMode()">Log in</a>';
    document.getElementById('auth-error').textContent   = '';
    document.getElementById('auth-username').value      = '';
    document.getElementById('auth-password').value      = '';
    document.getElementById('auth-modal').classList.add('open');
  }

  function closeAuthModal() { document.getElementById('auth-modal').classList.remove('open'); }
  function toggleAuthMode() { openAuthModal(authMode === 'login' ? 'register' : 'login'); }

  async function submitAuth() {
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl    = document.getElementById('auth-error');
    errEl.textContent = '';

    if (!username || !password) { errEl.textContent = 'Please fill in both fields.'; return; }

    const endpoint = authMode === 'login' ? '/login' : '/register';
    try {
      const res  = await fetch(AUTH + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Something went wrong.'; return; }
      setSession(data.token, data.username);
      closeAuthModal();
      updateUI();
    } catch (e) {
      errEl.textContent = 'Network error. Try again.';
    }
  }

  // ── Items ───────────────────────────────────────────────────────────────────
  document.getElementById('itemForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: authHeaders(),
        body: fd,
      });
      if (res.status === 401) { openAuthModal('login'); return; }
      if (!res.ok) { const d = await res.json(); throw new Error(JSON.stringify(d)); }
      alert('Item submitted successfully!');
      e.target.reset();
      loadItems();
    } catch (err) {
      alert('Failed to submit: ' + err.message);
    }
  });

  async function loadItems() {
    try {
      const res   = await fetch(API);
      let items   = await res.json();
      const search = document.getElementById('searchInput').value.toLowerCase();
      const status = document.getElementById('filterStatus').value;
      const now    = new Date();

      items = items.filter(item => {
        const age   = (now - new Date(item.dateLostOrFound)) / 86400000;
        return age <= 30
          && (!status || item.status === status)
          && (!search || item.itemName.toLowerCase().includes(search) || item.description.toLowerCase().includes(search));
      });

      const container = document.getElementById('itemsContainer');
      container.innerHTML = '';
      if (!items.length) {
        container.innerHTML = '<p style="text-align:center;width:100%;padding:20px">No items found.</p>';
        return;
      }
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <strong>${item.itemName}</strong> (${item.status})<br>
          ${item.description}<br>
          <em>${new Date(item.dateLostOrFound).toDateString()}</em><br>
          Contact: ${item.contactInfo}<br>
          ${item.imageURL ? `<img src="${item.imageURL}" alt="${item.itemName}" />` : ''}
          <br>
          ${item.status !== 'claimed'
            ? `<button onclick="markClaimed('${item._id}')">Mark as Claimed</button>`
            : '<span class="claimed">✔ Claimed</span>'}
        `;
        container.appendChild(card);
      });
    } catch (err) {
      document.getElementById('itemsContainer').innerHTML = 'Failed to load items.';
    }
  }

  async function markClaimed(id) {
    try {
      const res = await fetch(`${API}/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ status: 'claimed' }),
      });
      if (res.status === 401) { openAuthModal('login'); return; }
      if (!res.ok) throw new Error('Update failed');
      loadItems();
    } catch (err) {
      alert('Failed to update: ' + err.message);
    }
  }

  document.getElementById('searchInput').addEventListener('input', loadItems);
  document.getElementById('filterStatus').addEventListener('change', loadItems);

  updateUI();
  loadItems();
</script>
</body>
</html>
